# IMPORTANT: Replace base64 values before applying.
# Generate with: echo -n 'your-value' | base64
#
# Default values below are for LOCAL DEV only — never commit real secrets.
# In production, use Sealed Secrets, Vault, or inject via CI/CD pipeline.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: taskmanager
type: Opaque
data:
  # echo -n 'taskuser' | base64  => dGFza3VzZXI=
  POSTGRES_USER: dGFza3VzZXI=
  # echo -n 'taskpassword' | base64  => dGFza3Bhc3N3b3Jk
  POSTGRES_PASSWORD: dGFza3Bhc3N3b3Jk
  # echo -n 'taskdb' | base64  => dGFza2Ri
  POSTGRES_DB: dGFza2Ri