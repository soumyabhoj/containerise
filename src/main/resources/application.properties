# Datasource — values injected from Kubernetes Secret / environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:taskuser}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator — expose health and info for K8s liveness/readiness probes
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Application info
spring.application.name=taskmanager
info.app.name=Task Manager
info.app.version=1.0.0